<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        var path = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;
        window.sessionStorage.setItem(
          "gh-pages-redirect-path",
          path + search + hash
        );
        var segment = path.split('/')[1];
        // List of main portfolio routes that should go to root "/"
        var mainRoutes = ["projects", "experience", "contact", "project"];
        if (segment && mainRoutes.indexOf(segment) === -1) {
          window.location.replace("/" + segment + "/");
        } else {
          window.location.replace("/");
        }
      })();
    </script>
    <title>Redirecting...</title>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
